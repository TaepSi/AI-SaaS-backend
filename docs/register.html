<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat — Регистрация</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="icon"
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🤖</text></svg>'>
</head>
<body>
    <div class="bg-blur bg-1"></div>
    <div class="bg-blur bg-2"></div>

    <main class="auth-page fade-in">
        <div class="glass-card auth-card">
            <h1 class="logo neon-text">Создать аккаунт</h1>

            <!-- Шаг 1: Регистрация -->
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="you@example.com" />
                </div>

                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" placeholder="Минимум 3 символа" />
                </div>

                <div class="input-group">
                    <label>Повторите пароль</label>
                    <input type="password" id="registerPassword2" placeholder="Повторите пароль" />
                </div>

                <button type="submit" class="btn-primary">
                    Зарегистрироваться
                </button>

                <div id="registerError" class="error-text"></div>
                <div id="registerSuccess" class="success-text" style="color: #38bdf8; min-height: 20px;"></div>
            </form>

            <!-- Шаг 2: Верификация (скрыт до отправки кода) -->
            <form id="verifyForm" class="auth-form" style="display: none;">
                <p style="text-align: center; color: #a0a0b0; margin-bottom: 10px;">
                    Мы отправили код на вашу почту. Введите его ниже:
                </p>

                <div class="input-group">
                    <label>Код верификации</label>
                    <input type="text" id="verifyCode" placeholder="123456" maxlength="6" />
                </div>

                <button type="submit" class="btn-primary">
                    Подтвердить код
                </button>

                <div id="verifyError" class="error-text"></div>

                <p style="text-align: center; margin-top: 10px;">
                    <a href="#" id="resendCode" style="color: var(--blue);">Отправить код повторно</a>
                </p>
            </form>

            <div class="auth-links">
                <a href="index.html">
                    Уже есть аккаунт? Войти
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
